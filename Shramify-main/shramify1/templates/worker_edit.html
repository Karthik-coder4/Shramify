{% extends 'base.html' %}
{% block content %}
<h2>Edit Worker Profile</h2>
<form method="post" class="form" id="services-form" enctype="multipart/form-data">
  <label>Bio<textarea name="bio" rows="3">{{ user.bio }}</textarea></label>
  <label>Location
    <div style="display: flex; gap: 8px; align-items: center;">
      <input name="location" id="location-input" value="{{ user.location }}" required placeholder="Enter your location">
      <button type="button" onclick="detectLocation()" class="btn ghost" id="detect-btn" style="white-space: nowrap;">📍 Auto-Detect</button>
    </div>
    <small class="muted" style="display: block; margin-top: 4px;">Update your location to help customers find you</small>
  </label>
  <label>Government ID Number<input name="id_number" value="{{ user.id_number }}"></label>
  <label>Profile Picture
    <input type="file" name="profile_image" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp">
  </label>
  <label class="inline"><input type="checkbox" name="verified" {% if user.verified %}checked{% endif %}> Verified</label>

  <h3>Services</h3>
  <div id="services-list">
    {% for s in user.services %}
      <div class="service-item">
        <input name="service_type" placeholder="Type (e.g., electrician)" value="{{ s.type }}">
        <input name="service_price" type="number" placeholder="Price" value="{{ '%.0f' % s.price }}">
        <input name="service_desc" placeholder="Short description" value="{{ s.desc }}">
        <button type="button" onclick="removeService(this)">Remove</button>
      </div>
    {% endfor %}
  </div>
  <button type="button" onclick="addService()">+ Add Service</button>
  <button type="submit">Save</button>
</form>

<script>
  // Auto-detect location function
  function detectLocation(retryCount = 0) {
    const btn = document.getElementById('detect-btn');
    const input = document.getElementById('location-input');
    
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser');
      return;
    }
    
    // Check if Google Maps is loaded
    if (typeof google === 'undefined' || !google.maps) {
      alert('Maps service is still loading. Please wait a moment and try again.');
      return;
    }
    
    // Update button state
    btn.disabled = true;
    btn.textContent = '📍 Detecting...';
    btn.style.opacity = '0.6';
    
    // High accuracy options with progressive timeout
    const options = {
      enableHighAccuracy: true,
      timeout: 5000 + (retryCount * 2000), // 5s, 7s, 9s on retries
      maximumAge: 0
    };
    
    navigator.geolocation.getCurrentPosition(
      function(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = position.coords.accuracy;
        
        // Filter out inaccurate readings (> 100m) and retry
        if (accuracy > 100 && retryCount < 2) {
          console.log(`Low accuracy (${Math.round(accuracy)}m), retrying...`);
          setTimeout(() => detectLocation(retryCount + 1), 500);
          return;
        }
        
        // Use OpenStreetMap Nominatim (FREE) for reverse geocoding
        // Add accept-language=en to get English addresses
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=en`, {
          headers: {
            'User-Agent': 'Shramify App'
          }
        })
        .then(response => response.json())
        .then(data => {
          console.log('Geocoding success:', data);
          if (data && data.display_name) {
            input.value = data.display_name;
            btn.textContent = '✓ Location Set';
            btn.style.background = '#10b981';
            btn.style.borderColor = '#10b981';
            btn.style.color = '#ffffff';
            
            setTimeout(() => {
              btn.disabled = false;
              btn.textContent = '📍 Auto-Detect';
              btn.style.background = '';
              btn.style.borderColor = '';
              btn.style.color = '';
              btn.style.opacity = '1';
            }, 2000);
          } else {
            // Geocoding failed - use coordinates as fallback
            input.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            btn.disabled = false;
            btn.textContent = '📍 Auto-Detect';
            btn.style.opacity = '1';
          }
        })
        .catch(error => {
          console.error('Geocoding error:', error);
          // Use coordinates as fallback
          input.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
          btn.disabled = false;
          btn.textContent = '📍 Auto-Detect';
          btn.style.opacity = '1';
        });
      },
      function(error) {
        // Retry on timeout or unavailable position
        if ((error.code === error.TIMEOUT || error.code === error.POSITION_UNAVAILABLE) && retryCount < 2) {
          console.log('Location error, retrying...', error.code);
          setTimeout(() => detectLocation(retryCount + 1), 1000);
          return;
        }
        
        btn.disabled = false;
        btn.textContent = '📍 Auto-Detect';
        btn.style.opacity = '1';
        
        let errorMsg = 'Unable to detect location. ';
        switch(error.code) {
          case error.PERMISSION_DENIED:
            errorMsg += 'Please allow location access in your browser.';
            break;
          case error.POSITION_UNAVAILABLE:
            errorMsg += 'Location information is unavailable.';
            break;
          case error.TIMEOUT:
            errorMsg += 'Location request timed out.';
            break;
        }
        alert(errorMsg);
      },
      options
    );
  }
</script>
{% endblock %}
