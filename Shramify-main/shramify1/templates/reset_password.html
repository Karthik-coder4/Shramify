{% extends 'base.html' %}
{% block content %}
<h2>Reset Password</h2>
<p>Enter your email, the OTP you received, and your new password.</p>
<form method="post" class="form" onsubmit="return checkMatch(event)">
  <label>Email<input name="email" type="email" value="{{ email }}" required></label>
  <label>OTP<input name="otp" inputmode="numeric" pattern="^[0-9]{6}$" minlength="6" maxlength="6" required oninput="this.value=this.value.replace(/[^0-9]/g,'')"></label>
  <label>New Password<input name="password" id="pw1" type="password" required></label>
  <label>Confirm New Password<input name="confirm_password" id="pw2" type="password" required></label>
  <button type="submit">Reset Password</button>
</form>
<p><a href="{{ url_for('forgot_password') }}">Resend OTP</a></p>
<p><a href="{{ url_for('login') }}">Back to login</a></p>
<script>
  function checkMatch(e){
    var a = document.getElementById('pw1').value;
    var b = document.getElementById('pw2').value;
    if(a !== b){ alert('Passwords do not match'); return false; }
    return true;
  }
</script>
{% endblock %}
