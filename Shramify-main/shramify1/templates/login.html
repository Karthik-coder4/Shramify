{% extends 'base.html' %}
{% block body_class %}login-page{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="post" class="form">
  <label>Email or Mobile Number<input name="email" type="text" required placeholder="e.g. user@example.com or 9876543210">
    <small class="muted" style="display: block; margin-top: 4px;">You can login with either your email address or mobile number</small>
  </label>
  <label>Password<input name="password" type="password" required></label>
  <button type="submit">Login</button>
</form>
<p><a href="{{ url_for('forgot_password_sms') }}">Forgot your password?</a></p>
<p>New here? <a href="{{ url_for('register') }}">Create an account</a></p>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<div id="g_id_onload"
     data-client_id="{{ google_client_id }}"
     data-context="signin"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>
<div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rect" data-logo_alignment="left"></div>
<script>
  async function handleCredentialResponse(response){
    try{
      const r = await fetch("{{ url_for('auth_google') }}", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({credential: response.credential})});
      const data = await r.json();
      if (data && data.ok){ 
        // Check if user needs to complete profile
        if (data.redirect) {
          window.location.href = data.redirect;
        } else {
          window.location.href = "{{ url_for('home') }}";
        }
      } else { 
        alert("Google sign-in failed"); 
      }
    }catch(e){ 
      alert("Google sign-in error"); 
    }
  }
</script>
{% endblock %}
