{% extends 'base.html' %}
{% block content %}
<h2>Reset Password (SMS)</h2>
<p>Enter your phone number, the OTP you received via SMS, and your new password.</p>
<form method="post" class="form">
  <label>Phone
    <input name="phone" type="tel" inputmode="numeric" pattern="^[0-9]{10,15}$" minlength="10" maxlength="15" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  </label>
  <label>OTP
    <input name="otp" inputmode="numeric" pattern="^[0-9]{6}$" minlength="6" maxlength="6" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  </label>
  <label>New Password<input name="password" type="password" required></label>
  <button type="submit">Reset Password</button>
</form>
<p><a href="{{ url_for('forgot_password_sms') }}">Resend OTP</a></p>
<p><a href="{{ url_for('login') }}">Back to login</a></p>
{% endblock %}
