{% extends 'base.html' %}
{% block content %}
<h2 class="fade-in">My Profile</h2>
<div class="card fade-in">
  <div class="row">
    <div class="col">
      <div><strong>Name:</strong> {{ user.name }}</div>
      <div><strong>Email:</strong> {{ user.email }}</div>
      <div><strong>Role:</strong> {{ user.role }}</div>
      <div><strong>Location:</strong> {{ user.location }}</div>
      <div><strong>Phone:</strong> {{ user.phone }}</div>
    </div>
    <div class="col right">
      {% if user.role == 'worker' %}
        <a class="btn" href="{{ url_for('worker_profile') }}">View Worker Profile</a>
      {% endif %}
      <a class="btn ghost" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>
</div>
{% endblock %}
