{% extends 'base.html' %}
{% block content %}
<h2>🚀 Join Shramify Community</h2>
<p style="margin-bottom: 20px; color: #6b7280;">Create your account to connect with trusted local workers or offer your services to customers in your area.</p>
<form method="post" class="form">
  <label>Role
    <select name="role" required id="role">
      <option value="customer">Customer</option>
      <option value="worker">Worker</option>
    </select>
  </label>
  <div id="workerFields" style="display:none;">
    <label>Worker Type
      <select name="worker_type" id="worker_type">
        <option value="informal">Informal</option>
      </select>
    </label>
    <div id="informalKindRow">
      <label>Informal Category
        <input name="informal_kind" placeholder="e.g. Daily wage laborer, Self-employed carpenter, Freelance electrician">
        <small class="muted" style="display: block; margin-top: 4px;">Examples: Daily wage laborer, Self-employed carpenter, Independent plumber, Home-based cook, Part-time cleaner</small>
      </label>
    </div>
    <label>Date of Birth
      <input type="date" name="date_of_birth" id="dob" required>
      <small class="muted" style="display: block; margin-top: 4px;">You must be at least 18 years old to register as a worker</small>
    </label>
    <div id="age-error" style="display: none; color: #fca5a5; font-size: 0.9rem; margin-top: 4px; padding: 8px; background: rgba(239,68,68,.15); border: 1px solid #ef4444; border-radius: 8px;">
      ⚠️ You must be at least 18 years old to register as a worker.
    </div>
  </div>
  <label>Full name
    <input name="name" required pattern="[A-Za-z ]+" title="Name should contain only letters and spaces" placeholder="e.g. Ravi Kumar, Priya Sharma">
  </label>
  <label>Email
    <input name="email" type="email" required placeholder="e.g. ravi.kumar@gmail.com">
  </label>
  <label>Password
    <input name="password" type="password" required minlength="6" pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+" title="Password must be at least 6 characters and contain both letters and numbers" placeholder="Create a strong password (min 6 characters, letters and numbers)">
  </label>
  <label>Phone
    <input name="phone" type="tel" inputmode="numeric" pattern="^[0-9]{10}$" minlength="10" maxlength="10" required oninput="this.value=this.value.replace(/[^0-9]/g,'')" placeholder="e.g. 9876543210">
    <small class="muted" style="display: block; margin-top: 4px;">Enter exactly 10 digits only, no spaces or special characters</small>
  </label>
  <label>Location
    <div style="display: flex; gap: 8px; align-items: center;">
      <input name="location" id="location-input" required placeholder="e.g. Yarengalli, Ballari, Karnataka">
      <button type="button" onclick="detectLocation()" class="btn ghost" id="detect-btn" style="white-space: nowrap;">📍 Auto-Detect</button>
    </div>
    <small class="muted" style="display: block; margin-top: 4px;">
      💡 <strong>Tip:</strong> Type your location manually for accuracy (e.g., "Yarengalli, Ballari, Karnataka"). 
      Auto-detect works best on mobile devices with GPS.
    </small>
  </label>
  <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
<script>
  const roleSel = document.getElementById('role');
  const workerFields = document.getElementById('workerFields');
  const workerTypeSel = document.getElementById('worker_type');
  const informalKindRow = document.getElementById('informalKindRow');
  const dobInput = document.getElementById('dob');
  const ageError = document.getElementById('age-error');
  
  function syncVisibility() {
    const isWorker = roleSel.value === 'worker';
    workerFields.style.display = isWorker ? '' : 'none';
    const isInformal = workerTypeSel.value === 'informal';
    informalKindRow.style.display = isInformal ? '' : 'none';
    
    // Set DOB as required only for workers
    if (dobInput) {
      dobInput.required = isWorker;
    }
  }
  
  // Calculate age from date of birth
  function calculateAge(birthDate) {
    const today = new Date();
    const birth = new Date(birthDate);
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
      age--;
    }
    
    return age;
  }
  
  // Validate age on date change
  if (dobInput) {
    dobInput.addEventListener('change', function() {
      if (roleSel.value === 'worker' && this.value) {
        const age = calculateAge(this.value);
        if (age < 18) {
          ageError.style.display = 'block';
          this.setCustomValidity('You must be at least 18 years old');
        } else {
          ageError.style.display = 'none';
          this.setCustomValidity('');
        }
      }
    });
  }
  
  // Form submission validation
  document.querySelector('form').addEventListener('submit', function(e) {
    if (roleSel.value === 'worker' && dobInput && dobInput.value) {
      const age = calculateAge(dobInput.value);
      if (age < 18) {
        e.preventDefault();
        ageError.style.display = 'block';
        dobInput.focus();
        alert('You must be at least 18 years old to register as a worker.');
        return false;
      }
    }
  });
  
  roleSel.addEventListener('change', syncVisibility);
  workerTypeSel.addEventListener('change', syncVisibility);
  syncVisibility();
  
  // Auto-detect location function
  async function detectLocation(retryCount = 0) {
    const btn = document.getElementById('detect-btn');
    const input = document.getElementById('location-input');
    
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser');
      return;
    }
    
    btn.disabled = true;
    btn.textContent = '📍 Detecting...';
    btn.style.opacity = '0.6';
    
    // Try multiple methods for better accuracy
    try {
      // Method 1: Try high-accuracy GPS first
      const position = await new Promise((resolve, reject) => {
        const options = {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        };
        
        navigator.geolocation.getCurrentPosition(resolve, reject, options);
      });
      
      let lat = position.coords.latitude;
      let lng = position.coords.longitude;
      let accuracy = position.coords.accuracy;
      
      console.log(`GPS Location: ${lat}, ${lng} (accuracy: ${Math.round(accuracy)}m)`);
      
      // If accuracy is poor, try IP-based location as fallback
      if (accuracy > 1000) {
        console.log('GPS accuracy poor, trying IP-based location...');
        btn.textContent = '📍 Using IP location...';
        
        try {
          // Try ipapi.co for better accuracy (free, no API key needed)
          const ipResponse = await fetch('https://ipapi.co/json/');
          const ipData = await ipResponse.json();
          
          if (ipData.latitude && ipData.longitude) {
            console.log(`IP Location: ${ipData.city}, ${ipData.region}, ${ipData.country_name}`);
            
            // Use IP-based location if it seems more accurate
            lat = ipData.latitude;
            lng = ipData.longitude;
            
            // Create address from IP data
            const addressParts = [
              ipData.city,
              ipData.region,
              ipData.postal,
              ipData.country_name
            ].filter(Boolean);
            
            if (addressParts.length > 0) {
              input.value = addressParts.join(', ');
              btn.textContent = '✓ Location Set (IP-based)';
              btn.style.background = '#10b981';
              btn.style.borderColor = '#10b981';
              btn.style.color = '#ffffff';
              
              setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '📍 Auto-Detect';
                btn.style.background = '';
                btn.style.borderColor = '';
                btn.style.color = '';
                btn.style.opacity = '1';
              }, 2000);
              return;
            }
          }
        } catch (ipError) {
          console.log('IP location failed, using GPS coordinates');
        }
      }
      
      // Use OpenStreetMap Nominatim for reverse geocoding
      btn.textContent = '📍 Getting address...';
      const geocodeResponse = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=en`,
        {
          headers: {
            'User-Agent': 'Shramify App'
          }
        }
      );
      
      const data = await geocodeResponse.json();
      console.log('Geocoding result:', data);
      
      if (data && data.display_name) {
        input.value = data.display_name;
        btn.textContent = '✓ Location Set';
        btn.style.background = '#10b981';
        btn.style.borderColor = '#10b981';
        btn.style.color = '#ffffff';
        
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = '📍 Auto-Detect';
          btn.style.background = '';
          btn.style.borderColor = '';
          btn.style.color = '';
          btn.style.opacity = '1';
        }, 2000);
      } else {
        // Use coordinates as fallback
        input.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        btn.disabled = false;
        btn.textContent = '📍 Auto-Detect';
        btn.style.opacity = '1';
      }
      
    } catch (error) {
      console.error('Location detection error:', error);
      
      // Final fallback: Try IP-based location only
      try {
        btn.textContent = '📍 Using IP location...';
        const ipResponse = await fetch('https://ipapi.co/json/');
        const ipData = await ipResponse.json();
        
        if (ipData.city && ipData.region) {
          const addressParts = [
            ipData.city,
            ipData.region,
            ipData.postal,
            ipData.country_name
          ].filter(Boolean);
          
          input.value = addressParts.join(', ');
          btn.textContent = '✓ Location Set (IP-based)';
          btn.style.background = '#f59e0b';
          btn.style.borderColor = '#f59e0b';
          btn.style.color = '#ffffff';
          
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '📍 Auto-Detect';
            btn.style.background = '';
            btn.style.borderColor = '';
            btn.style.color = '';
            btn.style.opacity = '1';
          }, 2000);
          return;
        }
      } catch (ipError) {
        console.error('IP location also failed:', ipError);
      }
      
      // All methods failed
      btn.disabled = false;
      btn.textContent = '📍 Auto-Detect';
      btn.style.opacity = '1';
      
      let errorMsg = 'Unable to detect location. ';
      if (error.code === 1) {
        errorMsg += 'Please allow location access in your browser settings.';
      } else {
        errorMsg += 'Please enter your location manually.';
      }
      alert(errorMsg);
    }
  }
  
  // Auto-detect on page load (optional - uncomment if you want automatic detection)
  // window.addEventListener('load', function() {
  //   setTimeout(detectLocation, 1000);
  // });
</script>
{% endblock %}
