{% extends 'base.html' %}
{% block content %}
<h2>Forgot Password (SMS)</h2>
<p>Enter your registered phone number to receive an OTP via SMS.</p>
<form method="post" class="form">
  <label>Phone
    <input name="phone" type="tel" inputmode="numeric" pattern="^[0-9]{10,15}$" minlength="10" maxlength="15" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  </label>
  <button type="submit">Send OTP</button>
</form>
<p><a href="{{ url_for('forgot_password') }}">Use Email instead</a></p>
<p><a href="{{ url_for('login') }}">Back to login</a></p>
{% endblock %}
