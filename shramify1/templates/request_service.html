{% extends 'base.html' %}
{% block content %}
<h2>🛠️ Request Service from {{ w.name }}</h2>
<form method="post" class="form" id="reqForm">
  <div>
    <div><strong>Select Services</strong></div>
    <div class="list">
      {% for s in w.services %}
        <div class="row" style="align-items:center; gap:8px;">
          <label class="col">
            <input type="checkbox" name="sel" value="{{ loop.index0 }}">
            {{ s.type }} (₹{{ '%.0f' % s.price }})
          </label>
          <input type="hidden" name="type_{{ loop.index0 }}" value="{{ s.type }}">
          <input type="hidden" name="price_{{ loop.index0 }}" value="{{ '%.2f' % s.price }}">
          <label class="col right">Hours <input type="number" min="1" value="1" name="qty_{{ loop.index0 }}" style="width:80px"></label>
        </div>
      {% else %}
        <p class="muted">No services listed by this worker.</p>
      {% endfor %}
    </div>
    <div class="right"><strong>Estimated Total: ₹<span id="est_total">0</span></strong></div>
  </div>
  
  <div style="background: rgba(59, 130, 246, 0.1); padding: 12px; border-radius: 8px; margin: 16px 0;">
    <label><strong>💰 Your Offer Amount (₹)</strong>
      <input type="number" name="customer_offer" id="customer_offer" step="0.01" min="1" placeholder="Enter your budget/offer" style="margin-top: 4px;">
      <small class="muted" style="display: block; margin-top: 4px;">
        💡 <strong>Tip:</strong> Enter the amount you're willing to pay. The worker will see your offer and can accept or negotiate.
      </small>
    </label>
  </div>
  
  <label>Preferred Date<input type="date" name="date"></label>
  <label>Details<textarea name="details" rows="3" placeholder="Describe the work and any specific requirements"></textarea></label>
  <button type="submit">Send Request with Offer</button>
</form>
<script>
  const form = document.getElementById('reqForm');
  function recalc() {
    let total = 0;
    const sels = form.querySelectorAll('input[type="checkbox"][name="sel"]:checked');
    sels.forEach(cb => {
      const idx = cb.value;
      const price = parseFloat(form.querySelector(`[name="price_${idx}"]`).value || '0');
      const qty = parseInt(form.querySelector(`[name="qty_${idx}"]`).value || '1');
      total += price * qty;
    });
    document.getElementById('est_total').textContent = Math.round(total).toString();
  }
  
  // Auto-suggest customer offer based on estimated total
  function updateOfferSuggestion() {
    const estTotal = parseFloat(document.getElementById('est_total').textContent) || 0;
    const offerInput = document.getElementById('customer_offer');
    
    if (estTotal > 0 && !offerInput.value) {
      // Suggest slightly lower than estimated total
      const suggestedOffer = Math.max(1, Math.floor(estTotal * 0.9));
      offerInput.placeholder = `e.g. ₹${suggestedOffer} (suggested)`;
    }
  }
  
  form.addEventListener('change', () => {
    recalc();
    updateOfferSuggestion();
  });
  
  recalc();
  updateOfferSuggestion();
</script>
{% endblock %}
